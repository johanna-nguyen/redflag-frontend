<div class="page">

  <!-- TOP BAR -->
  <div class="top-bar">
    <button class="report-btn" (click)="openForm()">
      + Feedback
    </button>
  </div>

  <!-- SEARCH CENTER -->
  <div class="search-wrapper">
    <div class="search-box">
      <input
        type="text"
         [(ngModel)]="searchText"
        placeholder="Search people..."
        (keydown.enter)="onSearch()"
      />
      <span class="material-icons icon">search</span>
    </div>
    <div class="search-message" *ngIf="searchMessage" [ngClass]="messageType">
      {{ searchMessage }}
    </div>
  </div>

      

  <!-- RESULTS -->
  <div class="results">
    <div class="card" *ngFor="let r of results()">
      <div class="name">
        {{ r.firstName }} {{ r.lastName }}
      </div>
      <div class="meta">
        <span class="material-icons icon">place</span>{{ r.nationality }}
        <span class="material-icons icon">cake</span> {{ r.birthDate | date:'yyyy-MM-dd' }}
        <span class="material-icons icon">work</span> {{ r.job }}
      </div>
      <div class="tags">
  <span class="tag-item" *ngFor="let c of r.category">
    {{ c }}
  </span>
</div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="overlay" *ngIf="showForm()" (click)="closeForm()"></div>

<div class="modal" *ngIf="showForm()">

  <div class="modal-header">
    <h2>Report an user</h2>
    <p>Fill in information below</p>
  </div>

  <div class="modal-body">


    <!-- Using grid layout for first and last name -->
    <div class="grid">
      <input [(ngModel)]="form.firstName" placeholder="First Name (1 letter)" />
      <input [(ngModel)]="form.lastName" placeholder="Last Name (1 letter)" />
    </div>

    <!-- Dropdown for nationality -->
    <select [(ngModel)]="form.nationality">
      <option value="" disabled selected>Select nationality</option>

      <option *ngFor="let c of countries" [value]="c">
        {{ c }}
      </option>
    </select>

    <!-- Date picker for birth date -->
    <div class="grid">
      <input type="date" [(ngModel)]="form.birthDate" />
    </div>

    <!-- Dropdown for job -->
    <select [(ngModel)]="form.job">
      <option value="" disabled selected>Select job field</option>

      <option *ngFor="let j of jobs" [value]="j">
        {{ j }}
      </option>
    </select>

    <!-- Dropdown for category -->
<div class="category-wrapper" (click)="closeDropdownOutside($event)">

  <!-- SELECTED TAGS -->
  <div class="tags">
    <span class="tag" *ngFor="let c of form.category">
      {{ c }}
      <button (click)="removeCategory(c)">×</button>
    </span>

    <!-- INPUT -->
    <input
      type="text"
      placeholder="Search category..."
      [(ngModel)]="categoryInput"
      (input)="onCategoryInput()"
      (focus)="showDropdown = true"
      (keydown.enter)="selectFirstCategory()"
    />
  </div>

  <!-- DROPDOWN -->
  <div class="dropdown" *ngIf="showDropdown && filteredCategories.length > 0">
    <div
      class="item"
      *ngFor="let c of filteredCategories"
      (click)="addCategory(c)"
    >
      {{ c }}
    </div>
  </div>

</div>

  <div class="modal-footer">
    <button class="cancel" (click)="closeForm()">Cancel</button>
    <button class="submit" (click)="submit()">Submit</button>
  </div>

  <div class="submit-message" *ngIf="searchMessage" [ngClass]="messageType">
  {{ searchMessage }}
  </div>

</div>
